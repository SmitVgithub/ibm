# =============================================================================
# GitHub Actions CI/CD Pipeline for Static Website Deployment to Hetzner
# =============================================================================
# This pipeline handles:
# - Code quality checks (linting, security scanning)
# - Building and optimizing static assets
# - Docker image creation and registry push
# - Deployment to Hetzner dedicated server via SSH
# =============================================================================

name: CI/CD Pipeline - Deploy to Hetzner

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: false
        type: boolean

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Docker configuration
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
  # Node.js version for build
  NODE_VERSION: '20'
  
  # Deployment configuration
  DEPLOY_USER: deploy
  DEPLOY_PATH: /var/www/ibm-github-showcase
  CONTAINER_NAME: ibm-github-showcase
  
  # Health check configuration
  HEALTH_CHECK_RETRIES: 30
  HEALTH_CHECK_INTERVAL: 10

jobs:
  # ===========================================================================
  # Job 1: Code Quality and Security Checks
  # ===========================================================================
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run JSHint linting
        run: npm test
        continue-on-error: false

      - name: Run ESLint (additional checks)
        run: |
          npm install -g eslint
          eslint js/*.js --no-eslintrc --env browser,es6 --parser-options=ecmaVersion:2020 || true
        continue-on-error: true

      - name: Security audit - npm packages
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ibm-github-showcase'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 8
            --enableRetired
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            reports/
            dependency-check-report.html
          retention-days: 30

  # ===========================================================================
  # Job 2: Run Tests
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    if: ${{ !inputs.skip_tests }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: |
          chmod +x ./scripts/test-runner.sh
          ./scripts/test-runner.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            coverage/
          retention-days: 14

  # ===========================================================================
  # Job 3: Build Docker Image
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality-checks, test]
    if: always() && (needs.quality-checks.result == 'success') && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail on vulnerabilities, just report

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          artifact-name: sbom.spdx.json
          output-file: ./sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ===========================================================================
  # Job 4: Deploy to Hetzner Dedicated Server
  # ===========================================================================
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://${{ secrets.HETZNER_SERVER_DOMAIN || 'your-domain.com' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add server to known hosts to prevent MITM attacks
          ssh-keyscan -H ${{ secrets.HETZNER_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Configure SSH
          cat >> ~/.ssh/config << EOF
          Host hetzner-server
            HostName ${{ secrets.HETZNER_SERVER_IP }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify server connectivity
        run: |
          echo "Testing SSH connection to Hetzner server..."
          ssh hetzner-server "echo 'SSH connection successful' && uname -a"

      - name: Pre-deployment backup
        run: |
          ssh hetzner-server << 'ENDSSH'
          set -e
          
          # Create backup directory
          BACKUP_DIR="/var/backups/deployments/$(date +%Y%m%d_%H%M%S)"
          sudo mkdir -p "$BACKUP_DIR"
          
          # Backup current deployment if exists
          if [ -d "/var/www/ibm-github-showcase" ]; then
            echo "Creating backup of current deployment..."
            sudo cp -r /var/www/ibm-github-showcase "$BACKUP_DIR/" || true
          fi
          
          # Keep only last 5 backups
          cd /var/backups/deployments
          ls -t | tail -n +6 | xargs -r sudo rm -rf
          
          echo "Backup completed: $BACKUP_DIR"
          ENDSSH

      - name: Deploy to Hetzner server
        env:
          IMAGE_TAG: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Copy deployment script to server
          scp ./scripts/deploy.sh hetzner-server:/tmp/deploy.sh
          
          # Execute deployment
          ssh hetzner-server << ENDSSH
          set -e
          
          echo "========================================"
          echo "Starting deployment at \$(date)"
          echo "Image: ${IMAGE_TAG}"
          echo "========================================"
          
          # Login to GitHub Container Registry
          echo "${GITHUB_TOKEN}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull the new image
          echo "Pulling new image..."
          sudo docker pull ${IMAGE_TAG}
          
          # Stop existing container gracefully
          if sudo docker ps -q -f name=${{ env.CONTAINER_NAME }} | grep -q .; then
            echo "Stopping existing container..."
            sudo docker stop ${{ env.CONTAINER_NAME }} --time 30 || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true
          fi
          
          # Start new container with production configuration
          echo "Starting new container..."
          sudo docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart unless-stopped \
            --network host \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /var/cache/nginx:rw,noexec,nosuid,size=128m \
            --tmpfs /var/run:rw,noexec,nosuid,size=16m \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            --cap-add NET_BIND_SERVICE \
            --memory 256m \
            --memory-swap 256m \
            --cpus 0.5 \
            --health-cmd "curl -f http://localhost/health || exit 1" \
            --health-interval 30s \
            --health-timeout 10s \
            --health-retries 3 \
            --health-start-period 40s \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            --label "deployed.at=\$(date -Iseconds)" \
            --label "deployed.by=github-actions" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            -p 80:80 \
            -p 443:443 \
            ${IMAGE_TAG}
          
          # Clean up old images
          echo "Cleaning up old images..."
          sudo docker image prune -af --filter "until=168h" || true
          
          echo "Deployment command completed"
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for application to be healthy..."
          
          RETRIES=${{ env.HEALTH_CHECK_RETRIES }}
          INTERVAL=${{ env.HEALTH_CHECK_INTERVAL }}
          
          for i in $(seq 1 $RETRIES); do
            echo "Health check attempt $i/$RETRIES..."
            
            HEALTH_STATUS=$(ssh hetzner-server "sudo docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'unknown'")
            
            if [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "✅ Application is healthy!"
              
              # Verify HTTP response
              HTTP_STATUS=$(ssh hetzner-server "curl -s -o /dev/null -w '%{http_code}' http://localhost/" || echo "000")
              
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ HTTP health check passed (status: $HTTP_STATUS)"
                exit 0
              else
                echo "⚠️ HTTP status: $HTTP_STATUS (expected 200)"
              fi
            else
              echo "Current health status: $HEALTH_STATUS"
            fi
            
            if [ $i -lt $RETRIES ]; then
              echo "Waiting ${INTERVAL}s before next check..."
              sleep $INTERVAL
            fi
          done
          
          echo "❌ Health check failed after $RETRIES attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          
          ssh hetzner-server << 'ENDSSH'
          set -e
          
          # Find the previous working image
          PREVIOUS_IMAGE=$(sudo docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}" | head -2 | tail -1)
          
          if [ -n "$PREVIOUS_IMAGE" ] && [ "$PREVIOUS_IMAGE" != "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" ]; then
            echo "Rolling back to: $PREVIOUS_IMAGE"
            
            sudo docker stop ${{ env.CONTAINER_NAME }} --time 10 || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true
            
            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --network host \
              -p 80:80 \
              -p 443:443 \
              $PREVIOUS_IMAGE
            
            echo "Rollback completed"
          else
            echo "No previous image found for rollback"
            exit 1
          fi
          ENDSSH

      - name: Post-deployment notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          
          if [ "$STATUS" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "🔗 Application URL: https://${{ secrets.HETZNER_SERVER_DOMAIN || 'your-domain.com' }}"
            echo "📦 Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          else
            echo "❌ Deployment failed with status: $STATUS"
          fi

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -rf ~/.ssh/deploy_key ~/.ssh/config

  # ===========================================================================
  # Job 5: Post-Deployment Verification
  # ===========================================================================
  verify:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x ./scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh "https://${{ secrets.HETZNER_SERVER_DOMAIN || 'localhost' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Performance check with Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://${{ secrets.HETZNER_SERVER_DOMAIN || 'localhost' }}
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Security headers check
        run: |
          echo "Checking security headers..."
          HEADERS=$(curl -sI "https://${{ secrets.HETZNER_SERVER_DOMAIN || 'localhost' }}" || echo "")
          
          echo "$HEADERS"
          
          # Check for important security headers
          for header in "X-Content-Type-Options" "X-Frame-Options" "X-XSS-Protection" "Strict-Transport-Security"; do
            if echo "$HEADERS" | grep -qi "$header"; then
              echo "✅ $header is present"
            else
              echo "⚠️ $header is missing"
            fi
          done
        continue-on-error: true
